name: Rebuild rates engine v2

on:
  push:
    branches: [main]
    paths:
      - '.tmp/engine-v2.part*'
      - '.github/workflows/rebuild-rates-engine-v2.yml'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct engine
        shell: bash
        run: |
          cat .tmp/engine-v2.part00 \
              .tmp/engine-v2.part01 \
              .tmp/engine-v2.part02 \
              .tmp/engine-v2.part03 > /tmp/engine.bas.gz.b64
          base64 --decode /tmp/engine.bas.gz.b64 > /tmp/engine.bas.gz
          gzip --decompress --stdout /tmp/engine.bas.gz > Rates_Analysis_Engine.bas
          echo '39221f11e02b68ec2a1d5dfcd6d71ab4121712aeac3903e22a37b6d19b2a91a0  Rates_Analysis_Engine.bas' | sha256sum --check --strict

      - name: Validate VBA structure
        shell: python
        run: |
          from pathlib import Path
          import re
          from collections import Counter

          engine = Path('Rates_Analysis_Engine.bas').read_text(encoding='utf-8')
          setup = Path('Rates_Workbook_Setup.bas').read_text(encoding='utf-8')

          def check_module(name, text):
              subs = re.findall(r'^\s*(?:Public |Private )?Sub\s+([A-Za-z_][A-Za-z0-9_]*)', text, re.I | re.M)
              funcs = re.findall(r'^\s*(?:Public |Private )?Function\s+([A-Za-z_][A-Za-z0-9_]*)', text, re.I | re.M)
              assert len(subs) == len(re.findall(r'^\s*End Sub\s*$', text, re.I | re.M)), name
              assert len(funcs) == len(re.findall(r'^\s*End Function\s*$', text, re.I | re.M)), name
              names = [item.lower() for item in subs + funcs]
              duplicates = [item for item, count in Counter(names).items() if count > 1]
              assert not duplicates, (name, duplicates)
              assert '.Merge' not in text, name
              assert 'AutoFit' not in text, name

          check_module('setup', setup)
          check_module('engine', engine)

          required = [
              'Static sleeves; no implicit monthly rebalancing',
              'BuildPortfolioFrontiers',
              'gConstrainedFrontier',
              'gUnconstrainedFrontier',
              'BuildOutOfSample',
              'PortfolioPassesConstraints',
              'ResetRatesOutputs',
          ]
          for phrase in required:
              assert phrase in engine, phrase

          assert 'Frontier_Settings' in setup
          assert 'Existing Inputs, Curve, and Frontier_Settings data were preserved.' in setup
          print('VBA structure validation passed')

      - name: Remove temporary files and publish
        shell: bash
        run: |
          rm -rf .tmp
          rm -f .github/workflows/rebuild-rates-engine-v2.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish static-sleeve frontier rates engine'
          git push

# Merge-triggered reconstruction.
