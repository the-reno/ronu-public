name: Publish rollover audit syntax fix

on:
  push:
    branches: [main]
    paths:
      - '.tmp/rollover-audit.ready'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild corrected audit module
        shell: bash
        run: |
          base64 --decode .tmp/rollover-audit.part00 > /tmp/rollover-audit.bas.gz
          gzip --decompress --stdout /tmp/rollover-audit.bas.gz > Rates_Rollover_Audit_Database.bas
          echo '94fed025140431f6fcbf56db8a9cfd95bf4ea04070f7e68a32d49531f75a22bc  Rates_Rollover_Audit_Database.bas' | sha256sum --check --strict

      - name: Validate VBA structure
        shell: python
        run: |
          from pathlib import Path
          import re
          from collections import Counter

          text = Path('Rates_Rollover_Audit_Database.bas').read_text(encoding='utf-8')
          subs = re.findall(r'^\s*(?:Public |Private )?Sub\s+([A-Za-z_][A-Za-z0-9_]*)', text, re.I | re.M)
          funcs = re.findall(r'^\s*(?:Public |Private )?Function\s+([A-Za-z_][A-Za-z0-9_]*)', text, re.I | re.M)
          assert len(subs) == len(re.findall(r'^\s*End Sub\s*$', text, re.I | re.M))
          assert len(funcs) == len(re.findall(r'^\s*End Function\s*$', text, re.I | re.M))
          names = [item.lower() for item in subs + funcs]
          assert not [item for item, count in Counter(names).items() if count > 1]
          assert 'Array( _' not in text
          assert 'WriteAuditDatabaseHeaders ws' in text
          assert 'WriteAuditSummaryHeaders ws' in text
          assert 'ReDim rowData(0 To 20)' in text
          assert '.Merge' not in text
          assert 'AutoFit' not in text
          print('Rollover audit VBA validation passed')

      - name: Publish and clean temporary files
        shell: bash
        run: |
          rm -rf .tmp
          rm -f .github/workflows/publish-rollover-audit-fix.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix rollover audit VBA header syntax'
          git push origin main
