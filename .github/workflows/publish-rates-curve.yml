name: Publish rates curve CSV

on:
  push:
    paths:
      - 'temp/publish-rates-curve.trigger'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct validated CSV
        shell: bash
        run: |
          base64 --decode temp/Rates_Curve_2020-01-02_to_2026-07-10.csv.gz.b64 | gzip --decompress > Rates_Curve_2020-01-02_to_2026-07-10.csv
          test "$(head -n 1 Rates_Curve_2020-01-02_to_2026-07-10.csv)" = "Date,ON,1M,2M,3M,6M"
          test "$(tail -n 1 Rates_Curve_2020-01-02_to_2026-07-10.csv | cut -d, -f1)" = "2026-07-10"
          test "$(wc -l < Rates_Curve_2020-01-02_to_2026-07-10.csv)" -eq 1629
      - name: Remove temporary publication files
        shell: bash
        run: |
          rm -f temp/Rates_Curve_2020-01-02_to_2026-07-10.csv.gz.b64
          rm -f temp/publish-rates-curve.trigger
          rm -f .github/workflows/publish-rates-curve.yml
      - name: Commit published CSV
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish validated rates curve CSV"
          git push
